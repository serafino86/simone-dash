<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👨‍🍳 Gestionale Chef PRO</title>
  
  <!-- Open Graph / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://serafino86.github.io/simone-dash/">
  <meta property="og:title" content="Gestionale Chef PRO | Simone Chef">
  <meta property="og:description" content="Pannello di controllo privato per la gestione delle prenotazioni e dei menu di Simone Chef.">
  <meta property="og:image" content="https://serafino86.github.io/simone-dash/admin-wa-image.png">
  <meta property="og:image:width" content="1254">
  <meta property="og:image:height" content="1254">
  <meta property="og:image:type" content="image/png">
  
  <!-- Favicons -->
  <link rel="icon" href="https://serafino86.github.io/simone-chef/chef-team.png?v=1.4">
  <link rel="apple-touch-icon" href="https://serafino86.github.io/simone-chef/chef-team.png?v=1.4">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #D4AF37;
      --gold-hover: #F3E5AB;
      --bg-dark: #0f0f11;
      --card-bg: rgba(25, 25, 28, 0.95);
      --text-main: #f5f5f5;
      --text-muted: #a0a0a0;
      --border-color: rgba(212, 175, 55, 0.3);
      --success: #2e7d32;
      --danger: #c62828;
      --warning: #f57c00;
      --info: #1976d2;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .header-info {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .date-badge {
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid var(--border-color);
    }
    
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .refresh-btn:hover {
      background: var(--gold);
      color: #000;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      background: var(--card-bg);
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .tab {
      flex: 1;
      padding: 15px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      color: var(--text-muted);
      transition: all 0.3s;
    }
    
    .tab:hover {
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold);
    }
    
    .tab.active {
      background: var(--gold);
      color: #000;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .content-card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
    }
    
    .appointments-list {
      display: grid;
      gap: 20px;
    }
    
    .appointment-card {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 25px;
      transition: all 0.3s;
      position: relative;
    }
    
    .appointment-card:hover {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.05);
    }
    
    .appointment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 15px;
    }
    
    .appointment-time {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
    }
    
    .appointment-status {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .status-nuova { background: rgba(245, 124, 0, 0.2); color: var(--warning); border: 1px solid var(--warning); }
    .status-contattato { background: rgba(25, 118, 210, 0.2); color: var(--info); border: 1px solid var(--info); }
    .status-confermato { background: rgba(46, 125, 50, 0.2); color: var(--success); border: 1px solid var(--success); }
    .status-annullato { background: rgba(198, 40, 40, 0.2); color: var(--danger); border: 1px solid var(--danger); }
    
    .appointment-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .detail-group {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .detail-group h4 {
      color: var(--gold);
      font-size: 14px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .detail-group p {
      color: var(--text-main);
      font-size: 16px;
      white-space: pre-wrap;
    }
    
    .note-box {
      background: rgba(212, 175, 55, 0.05);
      border-left: 4px solid var(--gold);
      padding: 15px;
      margin-top: 15px;
      border-radius: 0 12px 12px 0;
    }

    .note-box h4 {
      color: var(--gold);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .note-box p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .action-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      flex: 1;
    }
    
    .btn-contatta { background: var(--info); color: white; }
    .btn-contatta:hover { background: #1565c0; }
    
    .btn-conferma { background: var(--success); color: white; }
    .btn-conferma:hover { background: #1b5e20; }
    
    .btn-annulla { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-annulla:hover { background: var(--danger); color: white; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .filter-btn {
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      color: var(--text-muted);
    }
    
    .filter-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    
    .filter-btn.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state h3 { margin-top: 20px; color: var(--gold); }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--gold);
      color: #000;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.4);
      display: flex;
      align-items: center;
      gap: 15px;
      transform: translateY(150%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
      font-weight: bold;
    }
    
    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .calendar-nav button {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .calendar-nav button:hover {
      background: var(--gold);
      color: #000;
    }
    
    .calendar-month {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    
    .calendar-header-day {
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      padding: 10px;
      text-transform: uppercase;
      font-size: 14px;
    }
    
    .calendar-day {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      min-height: 100px;
      position: relative;
      transition: all 0.3s;
    }
    
    .calendar-day:hover {
      border-color: var(--gold);
    }
    
    .calendar-day.past {
      opacity: 0.5;
    }

    .calendar-day.has-appointments {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.1);
    }
    
    .day-number {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-main);
      margin-bottom: 5px;
    }
    
    .day-appointments {
      font-size: 12px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 5px;
      background: rgba(212, 175, 55, 0.2);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .toast.show { transform: translateY(0); }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .header { padding: 15px; flex-direction: column; gap: 15px; text-align: center; }
      .header-info { width: 100%; flex-direction: column; }
      .date-badge, .refresh-btn { width: 100%; }
      .tabs { flex-wrap: wrap; }
      .tab { flex: none; width: 100%; }
      .appointment-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .appointment-details { grid-template-columns: 1fr; }
      .action-buttons { flex-direction: column; }
      .calendar-grid { grid-template-columns: repeat(7, 1fr); gap: 5px; }
      .calendar-day { min-height: 70px; padding: 5px; }
      .day-number { font-size: 14px; }
      .day-appointments { font-size: 10px; padding: 2px 4px; }
      .calendar-header-day { font-size: 10px; padding: 5px 0; }
    }

    /* Floating Dock */
    .floating-dock {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: rgba(25, 25, 28, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 10px 20px;
      border-radius: 99px;
      z-index: 2000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: dockAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .floating-dock.collapsed {
      transform: translate(-50%, calc(100% + 10px));
    }

    @keyframes dockAppear {
      from { bottom: -100px; opacity: 0; }
      to { bottom: 25px; opacity: 1; }
    }

    .dock-toggle {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(25, 25, 28, 0.95);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-bottom: none;
      color: var(--gold);
      padding: 5px 15px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(20px);
    }
    
    .dock-toggle svg { transition: 0.3s; }
    .floating-dock.collapsed .dock-toggle svg { transform: rotate(180deg); }
    .floating-dock.collapsed .dock-toggle { top: -35px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); border-radius: 10px; }

    .dock-group {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
    }
    .dock-group:not(:last-child) {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dock-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 20px;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .dock-btn:hover { transform: scale(1.2) translateY(-5px); }
    .dock-btn.wa-contact { background: #25D366; color: white; }
    .dock-btn.call-contact { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .dock-btn.wa-share { background: rgba(37, 211, 102, 0.1); color: #25D366; border: 1px solid rgba(37, 211, 102, 0.2); }
    .dock-btn.fb-share { background: rgba(24, 119, 242, 0.1); color: #1877F2; border: 1px solid rgba(24, 119, 242, 0.2); }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>👨‍🍳 Gestionale Chef PRO</h1>
      <div class="header-info">
        <div class="date-badge" id="current-date"></div>
        <button class="refresh-btn" onclick="refreshAll()">↻ Sincronizza</button>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('richieste')">📋 Richieste & Prenotazioni</button>
      <button class="tab" onclick="switchTab('calendario')">📅 Calendario Disponibilità</button>
      <button class="tab" onclick="switchTab('impostazioni')">⚙️ Menu & Impostazioni</button>
    </div>
    
    <!-- TAB RICHIESTE -->
    <div id="tab-richieste" class="tab-content active">
      <div class="content-card">
        <div class="filters">
          <button class="filter-btn active" onclick="filterAppointments('tutte')">Tutte</button>
          <button class="filter-btn" onclick="filterAppointments('nuove')">Nuove Richieste</button>
          <button class="filter-btn" onclick="filterAppointments('confermate')">Confermate</button>
        </div>
        
        <div class="appointments-list" id="appointments-list">
          <div style="text-align:center; padding: 40px; color: var(--gold);">⏳ Caricamento prenotazioni in corso...</div>
        </div>
      </div>
    </div>
    
    <!-- TAB CALENDARIO -->
    <div id="tab-calendario" class="tab-content">
      <div class="content-card">
        <div class="calendar-nav">
          <button onclick="prevMonth()">‹ Mese Precedente</button>
          <div class="calendar-month" id="calendar-title"></div>
          <button onclick="nextMonth()">Mese Successivo ›</button>
        </div>
        
        <div class="calendar-grid" id="calendar-grid">
          <!-- Popolato dinamicaente -->
        </div>

        <div style="text-align: center; margin-top: 30px;">
          <button class="action-btn btn-contatta" style="max-width: 300px; display: inline-block;" 
                  onclick="sincronizzaGoogleCalendar()">
            📅 Sincronizza su Google Calendar
          </button>
        </div>
      </div>
    </div>

    <!-- TAB IMPOSTAZIONI -->
    <div id="tab-impostazioni" class="tab-content">
      
      <div class="content-card">
        <h2 style="color: var(--gold); margin-bottom: 20px; font-family: 'Playfair Display', serif;">Gestione Testo Presentazione (Bio)</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;">
          Personalizza il testo in italiano. Le traduzioni in inglese e francese verranno gestite automaticamente da Google.
        </p>
        <textarea id="bio-editor" style="width: 100%; height: 150px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px; border-radius: 12px; font-family: 'Inter', sans-serif; resize: vertical; margin-bottom: 20px;" placeholder="Caricamento..."></textarea>
        <div style="text-align: right;">
          <button class="action-btn btn-conferma" style="max-width: 200px;" onclick="salvaBio()">
            💾 Salva Bio
          </button>
        </div>
      </div>

      <div class="content-card">
        <h2 style="color: var(--gold); margin-bottom: 20px; font-family: 'Playfair Display', serif;">Gestione Menu</h2>
        <div id="lista-menu" style="margin-bottom: 20px;">
          <!-- Menu list gets injected here -->
        </div>
        <button class="action-btn btn-contatta" style="max-width: 300px;" onclick="apriFormMenu()">
          ➕ Aggiungi Nuovo Menu
        </button>

        <div id="form-menu" style="display:none; margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:20px;">
          <h3 style="color: var(--gold); margin-bottom: 15px;" id="form-menu-title">Nuovo Menu</h3>
          <input type="hidden" id="menu-original-name">
          <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; color:var(--text-muted); font-size:14px;">Nome Menu (IT) *</label>
            <input type="text" id="menu-nome" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px;">
          </div>
          <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; color:var(--text-muted); font-size:14px;">Descrizione Menu (IT) *</label>
            <textarea id="menu-desc" style="width: 100%; height: 80px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px;"></textarea>
          </div>
          <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div style="flex:1;">
               <label style="display:block; margin-bottom:5px; color:var(--text-muted); font-size:14px;">Durata (Minuti) *</label>
               <input type="number" id="menu-durata" value="180" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px;">
            </div>
            <div style="flex:1;">
               <label style="display:block; margin-bottom:5px; color:var(--text-muted); font-size:14px;">Prezzo p.p. (CHF) *</label>
               <input type="number" id="menu-prezzo" value="100" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px;">
            </div>
          </div>
          <div style="display: flex; gap: 10px;">
            <button class="action-btn btn-conferma" onclick="salvaMenuJS()">Salva</button>
            <button class="action-btn btn-annulla" onclick="document.getElementById('form-menu').style.display='none'">Annulla</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">
    <div id="toast-message">Notifica aggiornata</div>
  </div>

  <script>
    // Usa lo STESSO URL dell'App Hub!
    const API_URL = 'https://script.google.com/macros/s/AKfycbwGQi-1glr2NNbU10a71VWHHg2Pd9FRCSXZ7X5ejADYRo7E4Sh8HKKPjtkHoY59GWm7kg/exec';
    
    let allAppointments = [];
    let allServizi = [];
    let currentFilter = 'tutte';
    
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();
    
    window.addEventListener('DOMContentLoaded', () => {
      updateCurrentDate();
      loadAppointments();
      loadBio();
    });
    
    function updateCurrentDate() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('current-date').textContent = now.toLocaleDateString('it-IT', options).toUpperCase();
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }
    
    async function loadAppointments() {
      try {
        const startDate = new Date();
        startDate.setMonth(startDate.getMonth() - 1); // un mese fa
        const endDate = new Date();
        endDate.setFullYear(endDate.getFullYear() + 1); // un anno avanti
        
        const response = await fetch(`${API_URL}?action=getAppuntamentiRange&dataInizio=${formatDate(startDate)}&dataFine=${formatDate(endDate)}`);
        const data = await response.json();
        
        if (data.successo) {
          allAppointments = data.appuntamenti || [];
          renderAppointments();
          renderCalendar();
        } else {
           document.getElementById('appointments-list').innerHTML = `<div style="text-align:center;color:red;">Errore: ${data.messaggio}</div>`;
        }
      } catch (error) {
        document.getElementById('appointments-list').innerHTML = `<div style="text-align:center;color:red;">Errore di connessione API.</div>`;
      }
    }
    
    function filterAppointments(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderAppointments();
    }
    
    function parseNotes(noteStr) {
      if (!noteStr || !noteStr.includes('|')) return { raw: noteStr, isParsed: false };
      
      const parts = noteStr.split(' | ');
      const result = { isParsed: true, raw: noteStr };
      
      parts.forEach(p => {
        if (p.startsWith('Ospiti:')) result.ospiti = p.replace('Ospiti:', '').trim();
        else if (p.startsWith('Allergie:')) result.allergie = p.replace('Allergie:', '').trim();
        else if (p.startsWith('Occasione:')) result.occasione = p.replace('Occasione:', '').trim();
        else if (p.startsWith('Menu/Varianti:')) result.richieste = p.replace('Menu/Varianti:', '').trim();
        else if (p.startsWith('Info Contatto:')) {
           const raw = p.replace('Info Contatto:', '').trim();
           result.nome = raw.split(', Tel:')[0];
           result.tel = raw.includes('Tel:') ? raw.split('Tel:')[1].split(', Email:')[0].trim() : '';
           result.email = raw.includes('Email:') ? raw.split('Email:')[1].trim() : '';
        }
      });
      return result;
    }

    function renderAppointments() {
      const list = document.getElementById('appointments-list');
      
      let filtered = allAppointments;
      
      if (currentFilter === 'nuove') {
        filtered = allAppointments.filter(a => String(a.stato).toLowerCase().includes('nuova'));
      } else if (currentFilter === 'confermate') {
        filtered = allAppointments.filter(a => String(a.stato).toLowerCase().includes('confermat') || String(a.stato).toLowerCase().includes('pagato'));
      }
      
      if (currentFilter !== 'tutte') {
         filtered = filtered.filter(a => !String(a.stato).toLowerCase().includes('annullato'));
      }
      
      filtered.sort((a, b) => new Date(a.data) - new Date(b.data));
      
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>Nessuna prenotazione trovata</h3></div>`;
        return;
      }
      
      list.innerHTML = filtered.map(appt => {
        const statoRaw = String(appt.stato).toLowerCase();
        let statusClass = 'status-nuova';
        let statusText = 'Nuova Richiesta';
        
        if (statoRaw.includes('contattato')) { statusClass = 'status-contattato'; statusText = 'In Sospeso'; }
        else if (statoRaw.includes('confermat') || statoRaw.includes('pagat')) { statusClass = 'status-confermato'; statusText = '✓ Confermato'; }
        else if (statoRaw.includes('annullato')) { statusClass = 'status-annullato'; statusText = '✗ Annullato'; }
        
        const details = parseNotes(appt.note);
        
        return `
          <div class="appointment-card" id="appt-${appt.id}">
            <div class="appointment-header">
              <div class="appointment-time">
                ${new Date(appt.data).toLocaleDateString('it-IT')} 
                <span style="color:var(--gold); font-size: 18px; margin-left: 10px;">🕒 ${appt.ora || "Sera"}</span>
              </div>
              <div class="appointment-status ${statusClass}">${statusText}</div>
            </div>
            
            <div class="appointment-details">
              <div class="detail-group">
                <h4>Menu Scelto</h4>
                <p style="font-weight:700; color:var(--gold);">${appt.servizio}</p>
              </div>
              <div class="detail-group">
                <h4>Cliente</h4>
                <p>${details.nome || 'N/D'}</p>
                <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
                   ${details.tel ? `<a href="tel:${details.tel}" class="action-btn btn-contatta" style="padding:5px 10px; font-size:12px; flex:none; text-decoration:none; display:inline-block; text-align:center;">📞 Chiama</a>` : ''}
                   ${details.email ? `<a href="mailto:${details.email}" class="action-btn btn-contatta" style="padding:5px 10px; font-size:12px; flex:none; text-decoration:none; display:inline-block; text-align:center; background:var(--gold); color:#000;">✉️ Email</a>` : ''}
                </div>
              </div>
            </div>

            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-top:15px;">
               <div class="detail-group" style="background:rgba(212, 175, 55, 0.05);">
                  <h4>Ospiti</h4>
                  <p>${details.ospiti || 'N/D'}</p>
               </div>
               <div class="detail-group" style="background:rgba(212, 175, 55, 0.05);">
                  <h4>Occasione</h4>
                  <p>${details.occasione || 'Nessuna'}</p>
               </div>
            </div>
            
            <div class="note-box" style="margin-top:15px;">
              <h4>Allergie / Intolleranze</h4>
              <p style="color:${(details.allergie && details.allergie !== 'Nessuna') ? 'var(--danger)' : 'var(--text-muted)'}; font-weight:${(details.allergie && details.allergie !== 'Nessuna') ? '700' : '400'}">${details.allergie || 'Nessuna'}</p>
            </div>

            ${details.richieste && details.richieste !== 'Nessuna' ? `
            <div class="note-box" style="border-left-color: var(--info); background: rgba(25, 118, 210, 0.05);">
              <h4 style="color:var(--info);">Note Speciali / Varianti</h4>
              <p>${details.richieste}</p>
            </div>
            ` : ''}

            ${!details.isParsed ? `
            <div class="note-box">
              <h4>Note Semplici</h4>
              <p>${appt.note || 'Nessuna nota'}</p>
            </div>
            ` : ''}
            
            <div class="action-buttons">
              <button class="action-btn btn-contatta" onclick="updateStatus('${appt.id}', 'Contattato')" 
                      ${statusText === 'In Sospeso' ? 'disabled style="opacity:0.5"' : ''}>
                🔄 In Sospeso
              </button>
              <button class="action-btn btn-conferma" onclick="updateStatus('${appt.id}', 'Confermato/Pagato')"
                      ${statusText === '✓ Confermato' ? 'disabled style="opacity:0.5"' : ''}>
                ✅ Conferma
              </button>
              <button class="action-btn btn-annulla" onclick="if(confirm('Annullare questa prenotazione?')) updateStatus('${appt.id}', 'Annullato')" 
                      ${statusText === '✗ Annullato' ? 'disabled style="opacity:0.5"' : ''}>
                ❌ Annulla
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    async function updateStatus(id, nuovoStato) {
      showToast('Aggiornamento in corso...');
      try {
        const response = await fetch(`${API_URL}?action=cambiaStatoAppuntamento&id=${id}&stato=${encodeURIComponent(nuovoStato)}`);
        const data = await response.json();
        
        if (data.successo) {
          showToast('✅ Stato aggiornato con successo!');
          loadAppointments();
        } else {
          showToast('❌ Errore durante l\'aggiornamento.');
        }
      } catch (error) {
        showToast('❌ Errore di connessione API.');
      }
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }
    
    function refreshAll() {
      showToast('Sincronizzazione in corso...');
      loadAppointments();
    }
    
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // LOGICA CALENDARIO MENSILE
    function prevMonth() {
      calMonth--;
      if (calMonth < 0) {
        calMonth = 11;
        calYear--;
      }
      renderCalendar();
    }
    
    function nextMonth() {
      calMonth++;
      if (calMonth > 11) {
        calMonth = 0;
        calYear++;
      }
      renderCalendar();
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      if(!grid) return;
      const title = document.getElementById('calendar-title');
      
      const monthNames = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno',
                          'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
      
      title.textContent = `${monthNames[calMonth]} ${calYear}`;
      
      // Header giorni
      grid.innerHTML = '';
      const dayNames = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
      dayNames.forEach(day => {
        const header = document.createElement('div');
        header.className = 'calendar-header-day';
        header.textContent = day;
        grid.appendChild(header);
      });
      
      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay = new Date(calYear, calMonth + 1, 0);
      const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
      
      for (let i = 0; i < startDay; i++) {
        grid.appendChild(document.createElement('div'));
      }
      
      const today = new Date();
      today.setHours(0,0,0,0);
      
      for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(calYear, calMonth, day);
        const dateStr = formatDate(date);
        
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        
        if (date < today) {
          dayEl.classList.add('past');
        }
        
        const dayAppts = allAppointments.filter(a => a.data === dateStr && !String(a.stato).toLowerCase().includes('annullato'));
        
        if (dayAppts.length > 0) {
          dayEl.classList.add('has-appointments');
        }
        
        dayEl.innerHTML = `
          <div class="day-number">${day}</div>
          ${dayAppts.length > 0 ? `<div class="day-appointments">${dayAppts.length} Prenotazione</div>` : ''}
        `;
        
        grid.appendChild(dayEl);
      }
    }

    async function loadBio() {
      try {
        const response = await fetch(`${API_URL}?action=getServizi`);
        const data = await response.json();
        if (data.successo) {
          if(data.bio) document.getElementById('bio-editor').value = data.bio.it || "";
          if(data.servizi) {
            allServizi = data.servizi;
            renderMenuUI();
          }
        }
      } catch (error) {
        console.error("Errore caricamento Bio e Menu");
      }
    }

    function renderMenuUI() {
      const container = document.getElementById('lista-menu');
      if (allServizi.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted)">Nessun menu presente.</span>';
        return;
      }

      container.innerHTML = allServizi.map((s, idx) => `
        <div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="color: var(--gold); font-weight: 600; margin-bottom: 5px;">${s.nome.it || 'Senza Nome'} <span style="color:#fff; font-size:14px; margin-left:10px;">CHF ${s.prezzo}</span></div>
            <div style="font-size: 13px; color: var(--text-muted);">${s.descrizione.it || ''}</div>
          </div>
          <div style="display: flex; gap: 10px;">
            <button class="action-btn btn-contatta" style="padding: 8px 16px; margin-left: 20px; max-width: 100px;" onclick="apriFormMenu(${idx})">Modifica</button>
            <button class="action-btn btn-annulla" style="padding: 8px 16px; max-width: 100px;" onclick="eliminaMenuJS('${(s.nome.it || '').replace(/'/g, "\\'")}')">Elimina</button>
          </div>
        </div>
      `).join('');
    }

    function apriFormMenu(idx = -1) {
      const form = document.getElementById('form-menu');
      form.style.display = 'block';
      if(idx >= 0) {
        const s = allServizi[idx];
        document.getElementById('form-menu-title').textContent = "Modifica Menu";
        document.getElementById('menu-original-name').value = (s.nome && s.nome.it) ? s.nome.it : '';
        document.getElementById('menu-nome').value = (s.nome && s.nome.it) ? s.nome.it : '';
        document.getElementById('menu-desc').value = (s.descrizione && s.descrizione.it) ? s.descrizione.it : '';
        document.getElementById('menu-durata').value = s.durata || 180;
        document.getElementById('menu-prezzo').value = s.prezzo || 0;
      } else {
        document.getElementById('form-menu-title').textContent = "Nuovo Menu";
        document.getElementById('menu-original-name').value = "";
        document.getElementById('menu-nome').value = "";
        document.getElementById('menu-desc').value = "";
        document.getElementById('menu-durata').value = "180";
        document.getElementById('menu-prezzo').value = "100";
      }
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function salvaMenuJS() {
      const nome = document.getElementById('menu-nome').value;
      if(!nome) return showToast('❌ Il Nome Menu è obbligatorio.');
      showToast('Salvataggio in corso...');
      
      const payload = {
        action: 'salvaMenu',
        originalName: document.getElementById('menu-original-name').value,
        nome: nome,
        descrizione: document.getElementById('menu-desc').value,
        durata: document.getElementById('menu-durata').value,
        prezzo: document.getElementById('menu-prezzo').value
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if(data.successo) {
          showToast('✅ Menu salvato!');
          document.getElementById('form-menu').style.display = 'none';
          loadBio(); // Aggiorna elenco
        } else {
          showToast('❌ Errore API: ' + data.messaggio);
        }
      } catch(e) {
        showToast('❌ Errore Connessione.');
      }
    }

    async function eliminaMenuJS(nomeOriginale) {
      if(!nomeOriginale) return;
      if(!confirm("Sei sicuro di voler eliminare il menu '" + nomeOriginale + "'? Questa operazione riga i dati dal database irreversibilmente.")) return;
      
      showToast('Eliminazione in corso...');
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'eliminaMenu', originalName: nomeOriginale })
        });
        const data = await response.json();
        if(data.successo) {
          showToast('✅ Menu eliminato!');
          loadBio();
        } else {
          showToast('❌ Errore: ' + data.messaggio);
        }
      } catch(e) {
        showToast('❌ Errore di Connessione.');
      }
    }

    async function salvaBio() {
      const testoIT = document.getElementById('bio-editor').value;
      showToast('Salvataggio Bio in corso...');
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'aggiornaBio',
            testoIT: testoIT
          })
        });
        
        const data = await response.json();
        if (data.successo) {
          showToast('✅ Bio aggiornata con successo! Il sito clienti è ora allineato.');
        } else {
          showToast('❌ Errore durante il salvataggio.');
        }
      } catch (error) {
        console.error(error);
        showToast('❌ Impossibile comunicare col server.');
      }
    }

    async function sincronizzaGoogleCalendar() {
      showToast('Sincronizzazione eventi confermati su Google Calendar...');
      try {
        const response = await fetch(`${API_URL}?action=syncGoogleCalendar`);
        const data = await response.json();
        
        if (data.successo) {
          showToast('✅ Sincronizzazione completata! ' + (data.creati || 0) + ' eventi aggiunti.');
        } else {
          showToast('❌ Errore sincronizzazione: ' + data.messaggio);
        }
      } catch (error) {
        showToast('❌ Errore di connessione API durante la sincronizzazione.');
      }
    }

    function toggleDock() {
      document.querySelector('.floating-dock').classList.toggle('collapsed');
